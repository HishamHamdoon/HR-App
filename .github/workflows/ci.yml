name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore EmployeeApp.sln

      - name: Build
        run: dotnet build EmployeeApp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test EmployeeApp.sln --configuration Release --no-build --verbosity normal
