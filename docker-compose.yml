services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123!"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Emp.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__Default: "Server=db;Database=EmpDB;User Id=sa;Password=Your_strong_Pass123!;TrustServerCertificate=True;"
      JwtOptions__Secret: "docker-compose-dev-only-secret-min-32-characters"
      JwtOptions__Issuer: "Emp.Api"
      JwtOptions__Audience: "Emp.Web"
      Cors__AllowedOrigins__0: "http://localhost:7026"
    ports:
      - "7031:8080"
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: EMP.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      # Web → API base URL inside the compose network.
      ApiUrls__BaseUrl: "http://api:8080"
    ports:
      - "7026:8080"
    depends_on:
      - api

volumes:
  mssql-data:
