services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_PID: "Express"            # free edition (10 GB limit) — plenty for HR
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Emp.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Server=db;Database=EmpDB;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;"
      JwtOptions__Secret: "${JWT_SECRET}"
      JwtOptions__Issuer: "Emp.Api"
      JwtOptions__Audience: "Emp.Web"
      Licensing__Secret: "${LICENSING_SECRET}"
      Cors__AllowedOrigins__0: "${WEB_ORIGIN}"
    volumes:
      - api-uploads:/app/wwwroot/uploads     # leave attachments survive restarts
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: EMP.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ASPNETCORE_URLS: "http://+:8080"
      ApiUrls__BaseUrl: "http://api:8080"   # internal compose DNS
    volumes:
      - web-keys:/app/DataProtection-Keys    # auth cookies stay valid across restarts
    ports:
      - "${WEB_PORT:-8080}:8080"             # the only port exposed to users
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  mssql-data:
  api-uploads:
  web-keys:
